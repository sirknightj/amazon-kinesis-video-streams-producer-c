name: KVS Common LWS

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

env:
  AWS_KVS_LOG_LEVEL: 7

jobs:
  mac-os-builds:
    runs-on: macos-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew update
          brew install mbedtls@2 googletest

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.x'

      - name: Build repository without dependencies
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_TEST=ON -DBUILD_COMMON_LWS=ON -DBUILD_DEPENDENCIES=OFF
          make -j
